<div class="site-shell">
  <header class="topbar section">
    <div class="container topbar__inner">
      <a class="brand" routerLink="/">
        <img class="brand__logo" src="/LOGO.png" alt="Axial TechnoCoats India logo" />
        <span class="brand__name">Axial TechnoCoats India</span>
      </a>
      <nav class="topnav">
        <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/categories" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Categories</a>
        <a routerLink="/about" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">About</a>
        <a routerLink="/industries" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Industries</a>
        <a routerLink="/resources" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Resources</a>
        <a routerLink="/contact" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Contact</a>
      </nav>
    </div>
  </header>
  <router-outlet></router-outlet>

  <nav class="section-nav" *ngIf="sections.length > 1" aria-label="Section navigation">
    <button
      class="section-nav__arrow"
      type="button"
      (click)="scrollBySection(-1)"
      [disabled]="currentSectionIndex === 0"
      aria-label="Previous section"
    >
      <span class="section-nav__chevron section-nav__chevron--up"></span>
    </button>

    <div class="section-nav__dots" aria-hidden="true">
      <button
        *ngFor="let section of sections; let index = index"
        class="section-nav__dot"
        type="button"
        [class.is-active]="index === currentSectionIndex"
        (click)="scrollToSection(index)"
        [attr.aria-label]="'Go to section ' + (index + 1)"
      ></button>
    </div>

    <button
      class="section-nav__arrow"
      type="button"
      (click)="scrollBySection(1)"
      [disabled]="currentSectionIndex === sections.length - 1"
      aria-label="Next section"
    >
      <span class="section-nav__chevron section-nav__chevron--down"></span>
    </button>
  </nav>
</div>
